<!DOCTYPE html>
<HTML lang="en">
    <HEAD>
        <TITLE>HBNB</TITLE>
    </HEAD>
    <BODY>
        <H1>{{title}}</H1>
        <UL>
			{% for state in states|sort(attribute="name") %}
			<LI>{{ state.id }}: <B>{{ state.name }}</B>
			<UL>
				{% for city in cities|sort(attribute="name") %}
				{% if state.id == city.state_id %}
				<LI>City: {{city.id}}: <B>{{city.name}}</B></LI>
				{% endif %}
				{% endfor %}
			</UL>
			</LI>
			{% endfor %}
        </UL>
    </BODY>
</HTML>
